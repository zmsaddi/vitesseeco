name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check translations
        run: npm run check:langs

      - name: Type check
        run: npx nuxi typecheck
        env:
          VERCEL: '1'

      - name: Build
        run: npx nuxi build
        env:
          VERCEL: '1'
